{% extends "base.html" %}

{% block content %}
<!-- 在现有内容前添加样式 -->
<style>
.pagination-circle .page-link {
    width: 40px;
    height: 40px;
    line-height: 25px;
    text-align: center;
    border-radius: 50% !important;
    padding: 0.5rem;
    margin: 0 3px;
    color: #7e7e7e;  /* 默认字体颜色 */
}

.pagination-circle .page-item.active .page-link {
    background-color: #2f4cdd;
    border-color: #2f4cdd;
    color: #fff;    /* 激活状态的字体颜色 */
}

.pagination-circle .page-link:hover {
    background-color: #eee;
    border-color: #dee2e6;
    color: #2f4cdd;  /* 悬停时的字体颜色 */
}

.pagination-circle .page-item.active .page-link:hover {
    background-color: #2f4cdd;
    color: white;
}

.pagination-circle .page-item.disabled .page-link {
    background-color: #f8f9fa;
    border-color: #dee2e6;
    color: #b7b7b7;  /* 禁用状态的字体颜色 */
    cursor: not-allowed;
}

.page-link:focus {
    box-shadow: none;
}

/* 分页信息文本样式 */
.pagination-info {
    color: #7e7e7e;
    font-size: 14px;
}

/* 分页按钮图标样式 */
.page-link i {
    font-size: 16px;
    line-height: 1.2;
}
</style>

<div class="container-fluid">
    <div class="row page-titles mx-0">
        <div class="col-sm-6 p-md-0">
            <div class="welcome-text">
                <h4>推广数据管理</h4>
                <span>推广数据列表</span>
            </div>
        </div>
        <div class="col-sm-6 p-md-0 justify-content-sm-end mt-2 mt-sm-0 d-flex">
            <button class="btn btn-primary" onclick="showAddModal()">添加推广数据</button>
        </div>
    </div>

    <!-- 搜索区域 -->
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <div class="form-row align-items-center">
                        <div class="col-auto">
                            <label class="sr-only" for="searchDateStart">开始日期</label>
                            <input type="date" class="form-control mb-2" id="searchDateStart">
                        </div>
                        <div class="col-auto">
                            <label class="sr-only" for="searchDateEnd">结束日期</label>
                            <input type="date" class="form-control mb-2" id="searchDateEnd">
                        </div>
                        <div class="col-auto">
                            <label class="sr-only" for="searchSceneName">场景名称</label>
                            <input type="text" class="form-control mb-2" id="searchSceneName" placeholder="请输入场景名称">
                        </div>
                        <div class="col-auto">
                            <button class="btn btn-primary mb-2" onclick="searchPromotions()">搜索</button>
                            <button class="btn btn-secondary mb-2 ml-2" onclick="resetSearch()">重置</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <!-- 添加搜索结果统计区域 -->
                    <div class="mt-3"></div>
                    
                    <div class="table-responsive">
                        <table id="promotionTable" class="table table-striped table-bordered">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>日期</th>
                                    <th>场景名称</th>
                                    <th>计划名称</th>
                                    <th>展现量</th>
                                    <th>点击量</th>
                                    <th>花费</th>
                                    <th>点击率</th>
                                    <th>总成交金额</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="promotionTableBody">
                                <!-- 数据将通过JavaScript动态填充 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 添加/编辑模态框 -->
<div class="modal fade" id="promotionModal">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">添加推广数据</h5>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="promotionForm">
                    <input type="hidden" id="promotionId">
                    <div class="row">
                        <!-- 第一列 -->
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="date">日期</label>
                                <input type="date" class="form-control" id="date" required>
                            </div>
                            <div class="form-group">
                                <label for="sceneName">场景名称</label>
                                <input type="text" class="form-control" id="sceneName" required>
                            </div>
                            <div class="form-group">
                                <label for="planName">计划名称</label>
                                <input type="text" class="form-control" id="planName" required>
                            </div>
                            <div class="form-group">
                                <label for="impressions">展现量</label>
                                <input type="number" class="form-control" id="impressions" required>
                            </div>
                            <div class="form-group">
                                <label for="clicks">点击量</label>
                                <input type="number" class="form-control" id="clicks" required>
                            </div>
                        </div>
                        <!-- 第二列 -->
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="cost">花费</label>
                                <input type="number" step="0.01" class="form-control" id="cost" required>
                            </div>
                            <div class="form-group">
                                <label for="clickRate">点击率</label>
                                <input type="number" step="0.00001" class="form-control" id="clickRate" required>
                            </div>
                            <div class="form-group">
                                <label for="totalTransactionAmount">总成交金额</label>
                                <input type="number" step="0.01" class="form-control" id="totalTransactionAmount" required>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="savePromotion()">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
let isEdit = false;
let currentDateStart = '';
let currentDateEnd = '';
let currentSceneName = '';
let currentPage = 1;
const pageSize = 10;

// 页面加载完成后获取列表
document.addEventListener('DOMContentLoaded', function() {
    loadPromotions(1);
});

// 搜索
function searchPromotions() {
    currentDateStart = document.getElementById('searchDateStart').value;
    currentDateEnd = document.getElementById('searchDateEnd').value;
    currentSceneName = document.getElementById('searchSceneName').value.trim();
    currentPage = 1;
    loadPromotions(currentPage);
}

// 重置搜索
function resetSearch() {
    document.getElementById('searchDateStart').value = '';
    document.getElementById('searchDateEnd').value = '';
    document.getElementById('searchSceneName').value = '';
    currentDateStart = '';
    currentDateEnd = '';
    currentSceneName = '';
    currentPage = 1;
    loadPromotions(currentPage);
}

// 加载列表
function loadPromotions(page) {
    currentPage = page;
    const params = {
        date_start: currentDateStart,
        date_end: currentDateEnd,
        scene_name: currentSceneName,
        page: currentPage,
        page_size: pageSize
    };

    const queryString = Object.keys(params)
        .filter(key => params[key] !== '')
        .map(key => `${key}=${encodeURIComponent(params[key])}`)
        .join('&');

    fetch(`/api/promotions?${queryString}`)
        .then(response => response.json())
        .then(data => {
            if (data.code === 200) {
                const tbody = document.getElementById('promotionTableBody');
                tbody.innerHTML = '';
                if (!data.data.promotions || data.data.promotions.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="10" class="text-center">暂无数据</td>
                        </tr>
                    `;
                } else {
                    data.data.promotions.forEach(promotion => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${promotion.id}</td>
                                <td>${promotion.date}</td>
                                <td>${promotion.scene_name || '-'}</td>
                                <td>${promotion.plan_name || '-'}</td>
                                <td>${promotion.impressions || 0}</td>
                                <td>${promotion.clicks || 0}</td>
                                <td>¥${promotion.cost || '0.00'}</td>
                                <td>${(promotion.click_rate * 100).toFixed(2)}%</td>
                                <td>¥${promotion.total_transaction_amount || '0.00'}</td>
                                <td>
                                    <button class="btn btn-sm btn-info" onclick="editPromotion(${promotion.id})">
                                        <i class="fa fa-edit"></i> 编辑
                                    </button>
                                    <button class="btn btn-sm btn-danger" onclick="deletePromotion(${promotion.id})">
                                        <i class="fa fa-trash"></i> 删除
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                }

                // 生成分页
                generatePagination(data.data.total);
                // 更新搜索结果统计
                updateSearchStats(data.data.total);
            } else {
                alert('获取推广数据列表失败：' + data.message);
            }
        })
        .catch(error => console.error('Error:', error));
}

// 生成分页
function generatePagination(total) {
    const totalPages = Math.ceil(total / pageSize);
    const pagination = document.createElement('nav');
    pagination.className = 'mt-3';
    
    let paginationHtml = `
        <div class="d-flex justify-content-between align-items-center">
            <div class="pagination-info">
                显示 ${(currentPage - 1) * pageSize + 1} 到 ${Math.min(currentPage * pageSize, total)} 条，共 ${total} 条记录
            </div>
            <ul class="pagination pagination-circle pagination-md">
    `;
    
    // 上一页
    paginationHtml += `
        <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
            <a class="page-link" href="javascript:void(0)" onclick="loadPromotions(${currentPage - 1})">
                <i class="fa fa-angle-left"></i>
            </a>
        </li>
    `;

    // 页码生成逻辑
    let startPage = Math.max(1, currentPage - 2);
    let endPage = Math.min(totalPages, currentPage + 2);

    // 确保显示至少5个页码（如果有）
    if (endPage - startPage < 4) {
        if (currentPage < totalPages / 2) {
            endPage = Math.min(startPage + 4, totalPages);
        } else {
            startPage = Math.max(endPage - 4, 1);
        }
    }

    // 第一页
    if (startPage > 1) {
        paginationHtml += `
            <li class="page-item">
                <a class="page-link" href="javascript:void(0)" onclick="loadPromotions(1)">1</a>
            </li>
        `;
        if (startPage > 2) {
            paginationHtml += `
                <li class="page-item disabled">
                    <a class="page-link">
                        <i class="fa fa-ellipsis-h"></i>
                    </a>
                </li>
            `;
        }
    }

    // 中间页码
    for (let i = startPage; i <= endPage; i++) {
        paginationHtml += `
            <li class="page-item ${i === currentPage ? 'active' : ''}">
                <a class="page-link" href="javascript:void(0)" onclick="loadPromotions(${i})">
                    <span>${i}</span>
                </a>
            </li>
        `;
    }

    // 最后页
    if (endPage < totalPages) {
        if (endPage < totalPages - 1) {
            paginationHtml += `
                <li class="page-item disabled">
                    <a class="page-link">
                        <i class="fa fa-ellipsis-h"></i>
                    </a>
                </li>
            `;
        }
        paginationHtml += `
            <li class="page-item">
                <a class="page-link" href="javascript:void(0)" onclick="loadPromotions(${totalPages})">
                    ${totalPages}
                </a>
            </li>
        `;
    }

    // 下一页
    paginationHtml += `
        <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
            <a class="page-link" href="javascript:void(0)" onclick="loadPromotions(${currentPage + 1})">
                <i class="fa fa-angle-right"></i>
            </a>
        </li>
    `;

    paginationHtml += `
            </ul>
        </div>
    `;
    
    pagination.innerHTML = paginationHtml;

    const existingPagination = document.querySelector('nav.mt-3');
    if (existingPagination) {
        existingPagination.replaceWith(pagination);
    } else {
        document.querySelector('.table-responsive').after(pagination);
    }
}

// 更新搜索结果统计
function updateSearchStats(total) {
    const statsDiv = document.createElement('div');
    statsDiv.className = 'mt-3';
    statsDiv.innerHTML = `
        <p class="text-muted">
            共找到 <span class="text-primary">${total}</span> 条记录
            ${currentDateStart ? `，开始日期："${currentDateStart}"` : ''}
            ${currentDateEnd ? `，结束日期："${currentDateEnd}"` : ''}
            ${currentSceneName ? `，场景名称包含："${currentSceneName}"` : ''}
        </p>
    `;

    const existingStats = document.querySelector('.mt-3');
    if (existingStats) {
        existingStats.replaceWith(statsDiv);
    } else {
        document.querySelector('.table-responsive').before(statsDiv);
    }
}

// 显示添加模态框
function showAddModal() {
    isEdit = false;
    document.getElementById('modalTitle').textContent = '添加推广数据';
    document.getElementById('promotionForm').reset();
    document.getElementById('promotionId').value = '';
    $('#promotionModal').modal('show');
}

// 编辑
function editPromotion(id) {
    isEdit = true;
    document.getElementById('modalTitle').textContent = '编辑推广数据';
    document.getElementById('promotionId').value = id;
    
    fetch(`/api/promotions/${id}`)
    .then(response => response.json())
    .then(data => {
        if (data.code === 200) {
            const promotion = data.data;
            document.getElementById('date').value = promotion.date;
            document.getElementById('sceneName').value = promotion.scene_name || '';
            document.getElementById('planName').value = promotion.plan_name || '';
            document.getElementById('impressions').value = promotion.impressions || '';
            document.getElementById('clicks').value = promotion.clicks || '';
            document.getElementById('cost').value = promotion.cost || '';
            document.getElementById('clickRate').value = promotion.click_rate || '';
            document.getElementById('totalTransactionAmount').value = promotion.total_transaction_amount || '';
            $('#promotionModal').modal('show');
        } else {
            alert('获取推广数据失败：' + data.message);
        }
    })
    .catch(error => console.error('Error:', error));
}

// 保存
function savePromotion() {
    const promotionId = document.getElementById('promotionId').value;
    const promotionData = {
        date: document.getElementById('date').value,
        scene_name: document.getElementById('sceneName').value,
        plan_name: document.getElementById('planName').value,
        impressions: parseInt(document.getElementById('impressions').value),
        clicks: parseInt(document.getElementById('clicks').value),
        cost: parseFloat(document.getElementById('cost').value),
        click_rate: parseFloat(document.getElementById('clickRate').value),
        total_transaction_amount: parseFloat(document.getElementById('totalTransactionAmount').value)
    };
    
    const method = isEdit ? 'PUT' : 'POST';
    const url = isEdit ? `/api/promotions/${promotionId}` : '/api/promotions';
    
    fetch(url, {
        method: method,
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(promotionData)
    })
    .then(response => response.json())
    .then(data => {
        if (data.code === 200) {
            $('#promotionModal').modal('hide');
            loadPromotions(currentPage);
            alert(isEdit ? '更新成功' : '添加成功');
        } else {
            alert((isEdit ? '更新' : '添加') + '失败：' + data.message);
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert((isEdit ? '更新' : '添加') + '失败：' + error.message);
    });
}

// 删除
function deletePromotion(id) {
    if (confirm('确定要删除这条推广数据吗？')) {
        fetch(`/api/promotions/${id}`, {
            method: 'DELETE'
        })
        .then(response => response.json())
        .then(data => {
            if (data.code === 200) {
                loadPromotions(currentPage);
                alert('删除成功');
            } else {
                alert('删除失败：' + data.message);
            }
        })
        .catch(error => console.error('Error:', error));
    }
}
</script>
{% endblock %}
