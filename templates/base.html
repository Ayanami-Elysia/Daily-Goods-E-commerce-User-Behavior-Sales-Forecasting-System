<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{% block title %}数据分析{% endblock %}</title>
    
    <link href="static/css/jqvmap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/css/chartist.min.css">
    <link href="static/css/bootstrap-select.min.css" rel="stylesheet">
    <link href="static/css/style.css" rel="stylesheet">
    <link href="static/css/LineIcons.css" rel="stylesheet">
 
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(180deg, #f4f8fc 0%, #eef5fb 100%);
            color: #2d3a48;
        }
        #main-wrapper {
            background: transparent;
        }
        .header {
            background: linear-gradient(135deg, rgba(29, 95, 135, 0.96) 0%, rgba(37, 138, 162, 0.94) 100%);
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 30px rgba(31, 82, 118, 0.18);
        }
        .header-content {
            padding-left: 20px;
            padding-right: 20px;
        }
        .header-right .btn-primary {
            border-radius: 999px;
            padding: 10px 20px;
            border: none;
            background: linear-gradient(135deg, #248fe2 0%, #3bb8c8 100%);
            box-shadow: 0 10px 22px rgba(36, 143, 226, 0.22);
        }
        .header-profile .nav-link {
            border-radius: 999px;
            padding: 8px 14px !important;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.22);
        }
        .header-info span {
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
        }
        .header-profile img {
            border-radius: 50%;
            margin-left: 10px;
        }
        .nav-header {
            background: linear-gradient(180deg, #1f5f88 0%, #256f97 100%);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: none;
            width: 16rem;
        }
        .brand-logo {
            justify-content: flex-start;
            padding: 0 24px;
            height: 5rem;
        }
        .brand-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #ffffff !important;
            white-space: nowrap;
        }
        .nav-control {
            right: 14px;
        }
        .hamburger .line {
            background: rgba(255, 255, 255, 0.85) !important;
        }
        .deznav {
            width: 16rem;
            background: linear-gradient(180deg, #256f97 0%, #2c7fa2 100%);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
        }
        .nav-text {
            display: inline-block !important;
            color: rgba(255, 255, 255, 0.92) !important;
            margin-left: 10px;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.4;
            white-space: nowrap;
        }
        .deznav-scroll {
            padding: 18px 14px 24px;
        }
        .menu-section {
            padding: 10px 16px 8px;
            margin-top: 10px;
            font-size: 13px;
            font-weight: 700;
            color: rgba(220, 236, 245, 0.62);
            letter-spacing: 0.3px;
            text-transform: none;
            pointer-events: none;
            list-style: none;
        }
        .menu-section:first-child {
            margin-top: 0;
        }
        .metismenu {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .metismenu > li:not(.menu-section) {
            width: 100%;
        }
        .metismenu a {
            color: rgba(255, 255, 255, 0.92) !important;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            flex-direction: row;
            border-radius: 12px;
            margin: 2px 0;
            transition: all 0.2s ease;
            min-height: 44px;
            width: 100%;
            overflow: hidden;
        }
        .metismenu a:hover,
        .metismenu a:focus,
        .metismenu li:hover > a {
            background: rgba(96, 165, 250, 0.22);
            color: #ffffff !important;
            box-shadow: none;
        }
        .metismenu li.menu-active > a {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.38) 0%, rgba(37, 99, 235, 0.28) 100%);
            color: #ffffff !important;
            box-shadow: none;
        }
        .metismenu li.menu-active .nav-text,
        .metismenu li:hover .nav-text {
            color: #ffffff !important;
        }
        .menu-icon {
            flex: 0 0 18px;
            font-size: 15px;
            width: 18px;
            text-align: center;
            color: rgba(255, 255, 255, 0.82);
        }
        .menu-title h4 {
            font-size: 16px;
            margin: 0;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }
        .metismenu > li {
            border-bottom: none;
        }
        .metismenu li.menu-active .menu-icon,
        .metismenu li:hover .menu-icon {
            color: #ffffff;
        }
        .content-body {
            min-height: calc(100vh - 5rem);
            padding-top: 24px;
            padding-right: 24px;
            background: transparent;
        }
        .right-profile .content-body {
            margin-right: 0;
        }
        [data-sidebar-style="full"][data-layout="vertical"] .menu-toggle .nav-header,
        [data-sidebar-style="full"][data-layout="vertical"] .deznav,
        [data-sidebar-style="full"][data-layout="vertical"] .content-body {
            transition: all .2s ease;
        }
        [data-sidebar-style="full"][data-layout="vertical"] .content-body {
            margin-left: 16rem;
        }
        .content-body .container-fluid,
        .content-body .row,
        .content-body .card {
            position: relative;
            z-index: 1;
        }
        .card {
            border: 1px solid #e7eff5;
            border-radius: 18px;
            box-shadow: 0 12px 36px rgba(48, 89, 128, 0.08);
        }
        .card-header {
            background: #ffffff;
            border-bottom: 1px solid #edf2f7;
        }
        .table-responsive,
        .table {
            background: #ffffff;
        }

        @media (max-width: 991px) {
            .nav-header,
            .deznav {
                width: 15rem;
            }
            [data-sidebar-style="full"][data-layout="vertical"] .content-body {
                margin-left: 15rem;
            }
            .header-content {
                padding-left: 12px;
                padding-right: 12px;
            }
            .metismenu a {
                margin: 2px 0;
            }
        }
        @media (max-width: 767px) {
            [data-sidebar-style="full"][data-layout="vertical"] .content-body {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <!--*******************
        Preloader start
    ********************-->
    <div id="preloader">
        <div class="sk-three-bounce">
            <div class="sk-child sk-bounce1"></div>
            <div class="sk-child sk-bounce2"></div>
            <div class="sk-child sk-bounce3"></div>
        </div>
    </div>
    <!--*******************
        Preloader end
    ********************-->
    <div class="header">
        <div class="header-content">
            <nav class="navbar navbar-expand">
                <div class="collapse navbar-collapse justify-content-between">

    
                    <ul class="navbar-nav header-right">
                        
                        
                        
                         <li class="nav-item dropdown d-none d-xl-flex">
                            <a class="btn btn-primary" href="/dashboard">数据分析中心</a>
                        </li>
                      
                        <li class="nav-item dropdown header-profile">
                            <a class="nav-link" href="#" role="button" data-toggle="dropdown">
                                <div class="header-info">
                                    <span id="currentUsername">加载中...</span>
                                </div>
                                <img src="static/picture/pic5.jpg" width="20" alt="">
                            </a>
                            <div class="dropdown-menu dropdown-menu-right">
                                <a href="javascript:void(0)" onclick="handleLogout()" class="dropdown-item ai-icon">
                                    <svg id="icon-logout" xmlns="http://www.w3.org/2000/svg" class="text-danger" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                                    <span class="ml-2">退出登录</span>
                                </a>
                            </div>
                        </li>
                    </ul>
                </div>
            </nav>
        </div>
    </div>
    <!--**********************************
        Main wrapper start
    ***********************************-->
    <div id="main-wrapper" class="right-profile">

        <!--**********************************
            Nav header start
        ***********************************-->
        <div class="nav-header">
            <a href="" class="brand-logo">
                <span class="brand-title" style="color: #333;">日用品</span>
            </a>

            <div class="nav-control">
                <div class="hamburger">
                    <span class="line"></span><span class="line"></span><span class="line">111</span>
                </div>
            </div>
        </div>
        <!--**********************************
            Nav header end
        ***********************************-->

        <!--**********************************
            Sidebar start
        ***********************************-->
        <div class="deznav">
            <div class="deznav-scroll">
                <ul class="metismenu" id="menu">
                    <li class="menu-section">概览</li>
                    <li>
                        <a href="/Index">
                            <i class="menu-icon fa fa-home"></i>
                            <span class="nav-text">首页</span>
                        </a>
                    </li>
                    <li class="menu-section">管理中心</li>
                    <li id="menu-user-manage" style="display:none;">
                        <a href="/User">
                            <i class="menu-icon fa fa-users"></i>
                            <span class="nav-text">用户管理</span>
                        </a>
                    </li>
                    <li>
                        <a href="/promotionlist">
                            <i class="menu-icon fa fa-bullhorn"></i>
                            <span class="nav-text">推广数据管理</span>
                        </a>
                    </li>
                    <li>
                        <a href="/orderlist">
                            <i class="menu-icon fa fa-list-alt"></i>
                            <span class="nav-text">订单管理</span>
                        </a>
                    </li>
                    <li class="menu-section">分析中心</li>
                    <li>
                        <a href="/analysis">
                            <i class="menu-icon fa fa-bar-chart"></i>
                            <span class="nav-text">数据分析</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
        <!--**********************************
            Sidebar end
        ***********************************-->

        <!--**********************************
            Content body start
        ***********************************-->
        <div class="content-body">
            {% block content %}{% endblock %}
        </div>
        <!--**********************************
            Content body end
        ***********************************-->

    </div>
    <!--**********************************
        Main wrapper end
    ***********************************-->

    <!--**********************************
        Scripts
    ***********************************-->
    <!-- Required vendors -->
    <script src="static/js/global.min.js"></script>
    <script src="static/js/bootstrap-select.min.js"></script>
    <script src="static/js/Chart.bundle.min.js"></script>
    <script src="static/js/custom.min.js"></script>
    <script src="static/js/deznav-init.js"></script>
    
    <!-- Counter Up -->
    <script src="static/js/jquery.waypoints.min.js"></script>
    <script src="static/js/jquery.counterup.min.js"></script>    
    
    <!-- Chart piety plugin files -->
    <script src="static/js/jquery.peity.min.js"></script>
    
    {% block extra_scripts %}{% endblock %}

    <script>
    // 页面加载时获取用户信息
    document.addEventListener('DOMContentLoaded', function() {
        const userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
        if (userInfo.username) {
            document.getElementById('currentUsername').textContent = userInfo.username;
        }

        // 管理员才显示用户管理菜单
        if (userInfo.role === 'admin') {
            const userManageMenu = document.getElementById('menu-user-manage');
            if (userManageMenu) userManageMenu.style.display = '';
        }

        const currentPath = window.location.pathname;
        document.querySelectorAll('#menu li a[href]').forEach(link => {
            const href = link.getAttribute('href');
            if (href && href === currentPath) {
                link.parentElement.classList.add('menu-active');
            }
        });
    });

    // 退出登录
    function handleLogout() {
        if (confirm('确定要退出登录吗？')) {
            localStorage.removeItem('userInfo');
            window.location.href = '/';
        }
    }
    </script>
</body>
</html>
