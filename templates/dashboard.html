<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>数据分析大屏</title>
    <script src="static/js/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0f1c3c;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        .dashboard {
            width: 100vw;
            height: 100vh;
            padding: 1vh 1vw;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            height: 8vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .header h1 {
            color: #00f2f1;
            font-size: 2.5vh;
            text-shadow: 0 0 10px rgba(0,242,241,0.5);
        }
        
        .header::before,
        .header::after {
            content: '';
            position: absolute;
            width: 30%;
            height: 2px;
            background: linear-gradient(to right, transparent, #00f2f1, transparent);
            bottom: 0;
        }
        
        .header::before {
            left: 0;
        }
        
        .header::after {
            right: 0;
        }
        
        .content {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 15vh 40vh 35vh;
            gap: 1vh 1vw;
            padding: 1vh 0;
        }
        
        .overview {
            grid-column: 1 / 4;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1vw;
        }
        
        .overview-card {
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            padding: 2vh 1.5vw;
            position: relative;
            border: 1px solid rgba(0,242,241,0.2);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .overview-card::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, transparent 98%, #00f2f1);
            top: 0;
            left: 0;
            pointer-events: none;
        }
        
        .card-title {
            font-size: 1.2vh;
            color: #00f2f1;
        }
        
        .card-value {
            font-size: 2.5vh;
            font-weight: bold;
            margin: 1vh 0;
        }
        
        .card-compare {
            font-size: 1vh;
            color: #8c8c8c;
            display: flex;
            justify-content: space-between;
        }
        
        .chart-card {
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            padding: 1.5vh 1vw;
            border: 1px solid rgba(0,242,241,0.2);
            display: flex;
            flex-direction: column;
        }
        
        .chart-header {
            height: 4vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chart-title {
            color: #00f2f1;
            font-size: 1.5vh;
            position: relative;
            padding-left: 1vw;
        }
        
        .chart-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 50%;
            background: #00f2f1;
        }
        
        .chart-content {
            flex: 1;
            width: 100%;
        }
        
        .rank-list {
            height: 100%;
            overflow-y: auto;
            padding-right: 1vw;
        }
        
        .rank-item {
            display: grid;
            grid-template-columns: 30px 1fr 80px 80px;
            padding: 1vh 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 1.2vh;
        }
        
        .rank-item:last-child {
            border-bottom: none;
        }
        
        .rank-num {
            color: #00f2f1;
            font-weight: bold;
        }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
        }
        
        ::-webkit-scrollbar-thumb {
            background: #00f2f1;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>销售数据分析大屏</h1>
        </div>
        
        <div class="content">
            <div class="overview">
                <div class="overview-card">
                    <div class="card-title">总销售额</div>
                    <div class="card-value" id="totalSales">¥0</div>
                    <div class="card-compare">
                        <span>日均销售</span>
                        <span id="avgDailySales">¥0</span>
                    </div>
                </div>
                <div class="overview-card">
                    <div class="card-title">总订单数</div>
                    <div class="card-value" id="totalOrders">0</div>
                    <div class="card-compare">
                        <span>日均订单</span>
                        <span id="avgDailyOrders">0</span>
                    </div>
                </div>
                <div class="overview-card">
                    <div class="card-title">平均客单价</div>
                    <div class="card-value" id="avgOrder">¥0</div>
                    <div class="card-compare">
                        <span>环比</span>
                        <span id="avgOrderTrend">0%</span>
                    </div>
                </div>
                <div class="overview-card">
                    <div class="card-title">商品转化率</div>
                    <div class="card-value" id="conversion">0%</div>
                    <div class="card-compare">
                        <span>环比</span>
                        <span id="conversionTrend">0%</span>
                    </div>
                </div>
            </div>
            
            <div class="chart-card" style="grid-column: 1 / 3;">
                <div class="chart-header">
                    <div class="chart-title">销售趋势分析</div>
                </div>
                <div class="chart-content" id="trendChart"></div>
            </div>
            
            <div class="chart-card">
                <div class="chart-header">
                    <div class="chart-title">商品类别占比</div>
                </div>
                <div class="chart-content" id="categoryChart"></div>
            </div>
            
            <div class="chart-card">
                <div class="chart-header">
                    <div class="chart-title">热销商品TOP10</div>
                </div>
                <div class="rank-list" id="rankList"></div>
            </div>
            
            <div class="chart-card" style="grid-column: 2 / 4;">
                <div class="chart-header">
                    <div class="chart-title">推广效果分析</div>
                </div>
                <div class="chart-content" id="promotionChart"></div>
            </div>
        </div>
    </div>

<script>
// 初始化图表
const trendChart = echarts.init(document.getElementById('trendChart'));
const categoryChart = echarts.init(document.getElementById('categoryChart'));
const promotionChart = echarts.init(document.getElementById('promotionChart'));

// 加载数据
function loadData() {
    Promise.all([
        fetch('/dashboard/overview'),
        fetch('/dashboard/sales_trend'),
        fetch('/dashboard/category_stats'),
        fetch('/dashboard/product_rank'),
        fetch('/dashboard/promotion_stats')
    ]).then(responses => Promise.all(responses.map(res => res.json())))
    .then(([overview, trend, category, rank, promotion]) => {
        if(overview.code === 200) updateOverview(overview.data);
        if(trend.code === 200) updateTrendChart(trend.data);
        if(category.code === 200) updateCategoryChart(category.data);
        if(rank.code === 200) updateRankList(rank.data);
        if(promotion.code === 200) updatePromotionChart(promotion.data);
    }).catch(error => console.error('数据加载失败:', error));
}

// 更新概览数据
function updateOverview(data) {
    // 更新总销售额
    document.getElementById('totalSales').innerText = `¥${data.sales}`;
    document.getElementById('avgDailySales').innerText = `¥${Math.round(data.sales/30)}`;
    
    // 更新总订单数
    document.getElementById('totalOrders').innerText = data.orders;
    document.getElementById('avgDailyOrders').innerText = Math.round(data.orders/30);
    
    // 更新平均客单价
    document.getElementById('avgOrder').innerText = `¥${data.avg_order}`;
    document.getElementById('avgOrderTrend').innerText = `${data.roi}%`;
    
    // 更新转化率
    document.getElementById('conversion').innerText = `${data.conversion}%`;
    document.getElementById('conversionTrend').innerText = `${data.conversion}%`;
}

// 更新销售趋势图
function updateTrendChart(data) {
    const option = {
        tooltip: {
            trigger: 'axis',
            axisPointer: { type: 'cross' }
        },
        legend: {
            data: ['销售额', '订单数'],
            textStyle: { color: '#fff' }
        },
        grid: {
            top: '10%',
            left: '3%',
            right: '4%',
            bottom: '3%',
            containLabel: true
        },
        xAxis: {
            type: 'category',
            boundaryGap: false,
            data: data.map(item => item.date),
            axisLabel: { color: '#fff' },
            axisLine: { lineStyle: { color: '#fff' } }
        },
        yAxis: [{
            type: 'value',
            name: '销售额',
            position: 'left',
            axisLabel: {
                color: '#fff',
                formatter: value => `¥${value}`
            },
            splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
        }, {
            type: 'value',
            name: '订单数',
            position: 'right',
            axisLabel: { color: '#fff' },
            splitLine: { show: false }
        }],
        series: [{
            name: '销售额',
            type: 'line',
            smooth: true,
            data: data.map(item => item.sales),
            itemStyle: { color: '#00f2f1' },
            areaStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{
                    offset: 0,
                    color: 'rgba(0,242,241,0.3)'
                }, {
                    offset: 1,
                    color: 'rgba(0,242,241,0.1)'
                }])
            }
        }, {
            name: '订单数',
            type: 'bar',
            yAxisIndex: 1,
            data: data.map(item => item.orders),
            itemStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{
                    offset: 0,
                    color: 'rgba(255,255,255,0.3)'
                }, {
                    offset: 1,
                    color: 'rgba(255,255,255,0.1)'
                }])
            }
        }]
    };
    trendChart.setOption(option);
}

// 更新商品类别占比图
function updateCategoryChart(data) {
    const option = {
        tooltip: {
            trigger: 'item',
            formatter: '{b}: {c} ({d}%)'
        },
        series: [{
            type: 'pie',
            radius: ['45%', '70%'],
            center: ['50%', '50%'],
            data: data,
            label: {
                color: '#fff',
                formatter: '{b}\n{d}%'
            },
            labelLine: {
                lineStyle: { color: 'rgba(255,255,255,0.3)' }
            },
            itemStyle: {
                borderColor: '#0f1c3c',
                borderWidth: 2
            }
        }]
    };
    categoryChart.setOption(option);
}

// 更新商品排行榜
function updateRankList(data) {
    const rankList = document.getElementById('rankList');
    rankList.innerHTML = data.map((item, index) => `
        <div class="rank-item">
            <div class="rank-num">${index + 1}</div>
            <div class="rank-title">${item.title}</div>
            <div class="rank-sales">¥${item.sales}</div>
            <div class="rank-count">${item.quantity}件</div>
        </div>
    `).join('');
}

// 更新推广效果图
function updatePromotionChart(data) {
    const option = {
        tooltip: {
            trigger: 'axis',
            axisPointer: { type: 'cross' }
        },
        legend: {
            data: ['推广费用', 'ROI', '转化率'],
            textStyle: { color: '#fff' }
        },
        grid: {
            top: '15%',
            left: '3%',
            right: '4%',
            bottom: '3%',
            containLabel: true
        },
        xAxis: {
            type: 'category',
            data: data.map(item => item.date),
            axisLabel: { color: '#fff' },
            axisLine: { lineStyle: { color: '#fff' } }
        },
        yAxis: [{
            type: 'value',
            name: '金额',
            position: 'left',
            axisLabel: {
                color: '#fff',
                formatter: value => `¥${value}`
            },
            splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
        }, {
            type: 'value',
            name: '比率',
            position: 'right',
            axisLabel: {
                color: '#fff',
                formatter: value => `${value}%`
            },
            splitLine: { show: false }
        }],
        series: [{
            name: '推广费用',
            type: 'bar',
            data: data.map(item => item.cost),
            itemStyle: { color: '#00f2f1' }
        }, {
            name: 'ROI',
            type: 'line',
            yAxisIndex: 1,
            data: data.map(item => item.roi),
            itemStyle: { color: '#ffd700' }
        }, {
            name: '转化率',
            type: 'line',
            yAxisIndex: 1,
            data: data.map(item => item.conversion),
            itemStyle: { color: '#ff69b4' }
        }]
    };
    promotionChart.setOption(option);
}

// 页面加载完成后执行
document.addEventListener('DOMContentLoaded', function() {
    loadData();
    // 每5分钟刷新一次
    setInterval(loadData, 300000);
    
    // 监听窗口大小变化
    window.addEventListener('resize', function() {
        trendChart.resize();
        categoryChart.resize();
        promotionChart.resize();
    });
});
</script>
</body>
</html>
