<!DOCTYPE html>
<html lang="en" class="h-100">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>用户注册</title>
    <link href="static/css/style.css" rel="stylesheet">
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            font-family: "Microsoft YaHei", sans-serif;
            background: #f5f7fb;
        }

        body {
            overflow-x: hidden;
        }

        .page-register {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            background: #ffffff;
        }

        .register-showcase {
            position: relative;
            overflow: hidden;
            background: linear-gradient(150deg, rgba(20, 137, 180, 0.95), rgba(83, 192, 160, 0.90));
            color: #ffffff;
        }

        .register-showcase::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(10, 34, 50, 0.08), rgba(10, 34, 50, 0.26));
            z-index: 1;
        }

        .showcase-bg {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            opacity: 0.24;
        }

        .showcase-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .showcase-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 56px 56px 48px;
        }

        .showcase-badge {
            display: inline-block;
            width: fit-content;
            padding: 8px 16px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.22);
            font-size: 13px;
        }

        .showcase-title {
            max-width: 560px;
            margin: 20px 0 16px;
            font-size: 40px;
            line-height: 1.35;
            font-weight: 700;
            color: #ffffff;
        }

        .showcase-text {
            max-width: 520px;
            margin: 0;
            font-size: 15px;
            line-height: 1.9;
            color: rgba(255, 255, 255, 0.92);
        }

        .showcase-points {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 28px;
        }

        .showcase-points span {
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.18);
            font-size: 13px;
        }

        .showcase-footer {
            display: flex;
            gap: 16px;
            align-items: flex-end;
        }

        .mini-card {
            min-width: 160px;
            padding: 18px 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.16);
        }

        .mini-card strong {
            display: block;
            margin-bottom: 6px;
            font-size: 22px;
            color: #ffffff;
        }

        .mini-card span {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.84);
        }

        .register-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 32px;
            background: #ffffff;
        }

        .register-card {
            width: 100%;
            max-width: 440px;
        }

        .register-logo {
            margin-bottom: 32px;
            text-align: center;
        }

        .register-logo h2 {
            margin: 0 0 10px;
            font-size: 30px;
            font-weight: 700;
            color: #243547;
        }

        .register-logo p {
            margin: 0;
            font-size: 14px;
            line-height: 1.8;
            color: #8a98a8;
        }

        .register-tabs {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 28px;
        }

        .register-tab {
            position: relative;
            padding-bottom: 10px;
            font-size: 16px;
            color: #a0a9b4;
        }

        .register-tab.active {
            color: #248fe2;
            font-weight: 600;
        }

        .register-tab.active::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 2px;
            background: #248fe2;
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #506273;
            font-weight: 600;
        }

        .form-control {
            height: 52px;
            border: 1px solid #d9e1ea;
            border-radius: 4px;
            background: #ffffff;
            padding: 0 16px;
            color: #334455;
            box-shadow: none;
        }

        .form-control:focus {
            border-color: #248fe2;
            box-shadow: 0 0 0 3px rgba(36, 143, 226, 0.10);
        }

        .form-error {
            display: none;
            margin-top: 6px;
            font-size: 13px;
            color: #dc3545;
        }

        .btn-register {
            width: 100%;
            height: 52px;
            border: none;
            border-radius: 4px;
            background: #248fe2;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            transition: background 0.2s ease;
        }

        .btn-register:hover,
        .btn-register:focus {
            background: #167fd3;
        }

        .register-bottom {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-top: 24px;
            font-size: 14px;
            color: #98a3af;
        }

        .register-bottom a {
            color: #7c8794;
        }

        @media (max-width: 991px) {
            .page-register {
                grid-template-columns: 1fr;
            }

            .register-showcase {
                min-height: 320px;
            }

            .showcase-content {
                padding: 36px 24px 30px;
            }

            .showcase-title {
                font-size: 30px;
            }

            .register-panel {
                padding: 36px 20px 48px;
            }
        }

        @media (max-width: 767px) {
            .register-showcase {
                min-height: 280px;
            }

            .showcase-footer {
                flex-wrap: wrap;
            }

            .register-tabs {
                gap: 24px;
            }

            .register-bottom {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="page-register">
        <section class="register-showcase">
            <div class="showcase-bg">
                <img src="static/image/1.png" alt="日用品图1">
                <img src="static/image/2.png" alt="日用品图2">
            </div>
            <div class="showcase-content">
                <div>
                    <div class="showcase-badge">日用品电商用户行为分析平台</div>
                    <h1 class="showcase-title">快速创建账号，进入日用品数据洞察工作台</h1>
                    <p class="showcase-text">
                        从用户行为、订单流转到商品消费偏好，注册后即可进入统一的数据分析入口，查看更清晰的业务趋势。
                    </p>
                    <div class="showcase-points">
                        <span>用户管理</span>
                        <span>订单分析</span>
                        <span>推广数据</span>
                        <span>偏好挖掘</span>
                    </div>
                </div>
                <div class="showcase-footer">
                    <div class="mini-card">
                        <strong>Users</strong>
                        <span>用户画像分析</span>
                    </div>
                    <div class="mini-card">
                        <strong>Orders</strong>
                        <span>订单行为追踪</span>
                    </div>
                    <div class="mini-card">
                        <strong>Insights</strong>
                        <span>消费偏好洞察</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="register-panel">
            <div class="register-card">
                <div class="register-logo">
                    <h2>创建账号</h2>
                    <p>注册后进入日用品数据分析平台</p>
                </div>

                <div class="register-tabs">
                    <div class="register-tab active">账号注册</div>
                    <div class="register-tab">平台入口</div>
                </div>

                <form id="registerForm" onsubmit="return handleRegister(event)">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input type="text" class="form-control" id="username" placeholder="请输入用户名" required>
                        <div class="form-error" id="username-error"></div>
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                        <div class="form-error" id="password-error"></div>
                    </div>
                    <div class="form-group">
                        <label for="phone">手机号</label>
                        <input type="tel" class="form-control" id="phone" placeholder="请输入手机号">
                        <div class="form-error" id="phone-error"></div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">重复密码</label>
                        <input type="password" class="form-control" id="confirmPassword" placeholder="请再次输入密码" required>
                        <div class="form-error" id="confirmPassword-error"></div>
                    </div>
                    <button type="submit" class="btn-register">立即注册</button>
                </form>

                <div class="register-bottom">
                    <span>已有账号可直接返回登录页</span>
                    <a href="/">前往登录</a>
                </div>
            </div>
        </section>
    </div>

    <!--**********************************
        Scripts
    ***********************************-->
    <!-- Required vendors -->
    <script src="static/js/global.min.js"></script>
    <script src="static/js/bootstrap-select.min.js"></script>
    <script src="static/js/custom.min.js"></script>
    <script src="static/js/deznav-init.js"></script>

    <script>
        function handleRegister(event) {
            event.preventDefault();

            document.querySelectorAll('.form-error').forEach(el => {
                el.style.display = 'none';
                el.textContent = '';
            });

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const phone = document.getElementById('phone').value;

            let hasError = false;
            if (!username) {
                showError('username', '请输入用户名');
                hasError = true;
            }
            if (!password) {
                showError('password', '请输入密码');
                hasError = true;
            }
            if (!confirmPassword) {
                showError('confirmPassword', '请再次输入密码');
                hasError = true;
            }
            if (phone && !/^1[3-9]\d{9}$/.test(phone)) {
                showError('phone', '请输入正确的11位手机号');
                hasError = true;
            }
            if (hasError) return false;

            if (password !== confirmPassword) {
                showError('confirmPassword', '两次输入的密码不一致');
                return false;
            }

            fetch('/user/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    password: password,
                    phone: phone
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 200) {
                    alert('注册成功！');
                    window.location.href = '/';
                } else {
                    showError('username', data.msg || '注册失败，请重试');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('注册失败，请重试');
            });

            return false;
        }

        function showError(field, message) {
            const errorEl = document.getElementById(`${field}-error`);
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }
    </script>
</body>
</html>
