<!DOCTYPE html>
<html lang="en" class="h-100">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>登录</title>
    <link href="static/css/style.css" rel="stylesheet">
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            font-family: "Microsoft YaHei", sans-serif;
            background: #f5f7fb;
        }

        body {
            overflow-x: hidden;
        }

        .page-login {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            background: #ffffff;
        }

        .login-showcase {
            position: relative;
            overflow: hidden;
            background: linear-gradient(150deg, rgba(24, 141, 183, 0.94), rgba(71, 192, 170, 0.88));
            color: #ffffff;
        }

        .login-showcase::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(13, 35, 51, 0.08), rgba(13, 35, 51, 0.24));
            z-index: 1;
        }

        .showcase-bg {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: 1.05fr 0.95fr;
            opacity: 0.28;
        }

        .showcase-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .showcase-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 56px 56px 48px;
        }

        .showcase-badge {
            display: inline-block;
            width: fit-content;
            padding: 8px 16px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.22);
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .showcase-title {
            max-width: 560px;
            margin: 20px 0 16px;
            font-size: 42px;
            line-height: 1.35;
            font-weight: 700;
            color: #ffffff;
        }

        .showcase-text {
            max-width: 520px;
            margin: 0;
            font-size: 15px;
            line-height: 1.9;
            color: rgba(255, 255, 255, 0.92);
        }

        .showcase-points {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 28px;
        }

        .showcase-points span {
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.18);
            font-size: 13px;
        }

        .showcase-footer {
            display: flex;
            gap: 16px;
            align-items: flex-end;
        }

        .mini-card {
            min-width: 150px;
            padding: 18px 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.16);
        }

        .mini-card strong {
            display: block;
            margin-bottom: 6px;
            font-size: 24px;
            color: #ffffff;
        }

        .mini-card span {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.84);
        }

        .login-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 32px;
            background: #ffffff;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
        }

        .login-logo {
            margin-bottom: 34px;
            text-align: center;
        }

        .login-logo h2 {
            margin: 0 0 10px;
            font-size: 30px;
            font-weight: 700;
            color: #243547;
        }

        .login-logo p {
            margin: 0;
            font-size: 14px;
            line-height: 1.8;
            color: #8a98a8;
        }

        .login-tabs {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 28px;
        }

        .login-tab {
            position: relative;
            padding-bottom: 10px;
            font-size: 16px;
            color: #a0a9b4;
            cursor: default;
        }

        .login-tab.active {
            color: #248fe2;
            font-weight: 600;
        }

        .login-tab.active::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 2px;
            background: #248fe2;
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #506273;
            font-weight: 600;
        }

        .form-control {
            height: 52px;
            border: 1px solid #d9e1ea;
            border-radius: 4px;
            background: #ffffff;
            padding: 0 16px;
            color: #334455;
            box-shadow: none;
        }

        .form-control:focus {
            border-color: #248fe2;
            box-shadow: 0 0 0 3px rgba(36, 143, 226, 0.10);
        }

        .role-group {
            display: flex;
            gap: 24px;
            padding: 0;
            margin-bottom: 0;
            background: transparent;
            border: none;
        }

        .role-option {
            display: flex;
            align-items: center;
            cursor: pointer;
            color: #5a6a79;
        }

        .role-option input[type="radio"] {
            margin-right: 8px;
        }

        .role-option label {
            margin: 0;
            font-weight: normal;
            cursor: pointer;
        }

        .form-error {
            display: none;
            margin-top: 6px;
            font-size: 13px;
            color: #dc3545;
        }

        .btn-login {
            width: 100%;
            height: 52px;
            border: none;
            border-radius: 4px;
            background: #248fe2;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            transition: background 0.2s ease;
        }

        .btn-login:hover,
        .btn-login:focus {
            background: #167fd3;
        }

        .login-bottom {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-top: 24px;
            font-size: 14px;
            color: #98a3af;
        }

        .login-bottom a {
            color: #7c8794;
        }

        @media (max-width: 991px) {
            .page-login {
                grid-template-columns: 1fr;
            }

            .login-showcase {
                min-height: 320px;
            }

            .showcase-content {
                padding: 36px 24px 30px;
            }

            .showcase-title {
                font-size: 30px;
            }

            .login-panel {
                padding: 36px 20px 48px;
            }
        }

        @media (max-width: 767px) {
            .login-showcase {
                min-height: 280px;
            }

            .showcase-footer {
                flex-wrap: wrap;
            }

            .login-tabs {
                gap: 24px;
            }

            .login-bottom {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="page-login">
        <section class="login-showcase">
            <div class="showcase-bg">
                <img src="static/image/1.png" alt="日用品图1">
                <img src="static/image/2.png" alt="日用品图2">
            </div>
            <div class="showcase-content">
                <div>
                    <div class="showcase-badge">日用品电商用户行为分析平台</div>
                    <h1 class="showcase-title">以更简洁的界面，进入更清晰的数据洞察</h1>
                    <p class="showcase-text">
                        聚焦用户、订单、推广与消费偏好分析，用轻量化的登录入口连接日用品业务数据工作台。
                    </p>
                    <div class="showcase-points">
                        <span>用户画像</span>
                        <span>订单监测</span>
                        <span>推广分析</span>
                        <span>偏好挖掘</span>
                    </div>
                </div>
                <div class="showcase-footer">
                    <div class="mini-card">
                        <strong>24h</strong>
                        <span>实时数据监测</span>
                    </div>
                    <div class="mini-card">
                        <strong>Top N</strong>
                        <span>热销品类追踪</span>
                    </div>
                    <div class="mini-card">
                        <strong>ROI</strong>
                        <span>推广效果评估</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="login-panel">
            <div class="login-card">
                <div class="login-logo">
                    <h2>登录系统</h2>
                    <p>日用品数据分析平台</p>
                </div>

                <div class="login-tabs">
                    <div class="login-tab active">账号登录</div>
                    <div class="login-tab">数据入口</div>
                </div>

                <form id="loginForm" onsubmit="return handleLogin(event)">
                    <div class="form-group">
                        <label for="username">账号</label>
                        <input type="text" class="form-control" id="username" placeholder="请输入账号" required>
                        <div class="form-error" id="username-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                        <div class="form-error" id="password-error"></div>
                    </div>

                    <div class="form-group">
                        <label>角色</label>
                        <div class="role-group">
                            <div class="role-option">
                                <input type="radio" id="admin" name="role" value="admin" checked>
                                <label for="admin">管理员</label>
                            </div>
                            <div class="role-option">
                                <input type="radio" id="user" name="role" value="user">
                                <label for="user">普通用户</label>
                            </div>
                        </div>
                        <div class="form-error" id="role-error"></div>
                    </div>

                    <button type="submit" class="btn-login">登录 / 注册</button>
                </form>

                <div class="login-bottom">
                    <span>未注册将自动引导至账号创建流程</span>
                    <a href="/register">前往注册</a>
                </div>
            </div>
        </section>
    </div>

    <script src="static/js/global.min.js"></script>
    <script src="static/js/bootstrap-select.min.js"></script>
    <script src="static/js/custom.min.js"></script>
    <script src="static/js/deznav-init.js"></script>

    <script>
        function handleLogin(event) {
            event.preventDefault();

            document.querySelectorAll('.form-error').forEach(el => {
                el.style.display = 'none';
                el.textContent = '';
            });

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.querySelector('input[name="role"]:checked').value;

            let hasError = false;
            if (!username) {
                showError('username', '请输入账号');
                hasError = true;
            }
            if (!password) {
                showError('password', '请输入密码');
                hasError = true;
            }
            if (hasError) return false;

            fetch('/user/loginApi', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    password: password,
                    role: role
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 200) {
                    localStorage.setItem('userInfo', JSON.stringify(data.data));
                    window.location.href = '/Index';
                } else {
                    showError('username', data.msg);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('登录失败，请重试');
            });

            return false;
        }

        function showError(field, message) {
            const errorEl = document.getElementById(`${field}-error`);
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }
    </script>
</body>
</html>
